<!DOCTYPE html>
<html>

<head>
  <title>Product CRUD</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

  <h1>Product CRUD</h1>

  <form id="add-product-form">

    <h2>Add Product</h2>

    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <!-- adicionando descrição -->
    <label for="description">Description:</label>
    <input type="text" id="description" name="description" required>

    <label for="price">Price:</label>
    <input type="number" id="price" name="price" required step="0.01">

    <button type="submit">Add</button>

  </form>

  <!-- consulta por id -->
  <form id="search-product-form">

    <h2>Search Product by ID</h2>

    <label for="search-id">Product ID:</label>
    <input type="number" id="search-id" required>

    <button type="submit">Search</button>

  </form>

  <div id="search-result"></div>

  <!-- formulário de update -->
  <form id="update-product-form">

    <h2>Update Product</h2>

    <input type="hidden" id="update-id">

    <label for="update-name">Name:</label>
    <input type="text" id="update-name" required>

    <!-- adicionando descrição -->
    <label for="update-description">Description:</label>
    <input type="text" id="update-description" required>

    <label for="update-price">Price:</label>
    <input type="number" id="update-price" required step="0.01">

    <button type="submit">Update Product</button>

  </form>

  <ul id="products"></ul>

  <script src="app.js"></script>

  <script>
    window.addEventListener('load', fetchProducts);
  </script>

</body>

</html>
