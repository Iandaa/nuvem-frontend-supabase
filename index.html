<!DOCTYPE html>
<html>

<head>
  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

  <h1>Cadastro de Produtos</h1>

  <form id="add-product-form">

    <h2>Adicionar Produto</h2>

    <label for="name">Nome:</label>
    <input type="text" id="name" name="name" required>

    <!-- adicionando descrição -->
    <label for="description">Descrição:</label>
    <input type="text" id="description" name="description" required>

    <label for="price">Preço:</label>
    <input type="number" id="price" name="price" required step="0.01">

    <button type="submit">Adicionar</button>

  </form>

  <!-- consulta por id -->
  <form id="search-product-form">

    <h2>Buscar Produto por ID</h2>

    <label for="search-id">ID do Produto:</label>
    <input type="number" id="search-id" required>

    <button type="submit">Buscar</button>

  </form>

  <div id="search-result"></div>

  <!-- formulário de update -->
  <form id="update-product-form">

    <h2>Atualizar Produto</h2>

    <input type="hidden" id="update-id">

    <label for="update-name">Nome:</label>
    <input type="text" id="update-name" required>

    <!-- adicionando descrição -->
    <label for="update-description">Descrição:</label>
    <input type="text" id="update-description" required>

    <label for="update-price">Preço:</label>
    <input type="number" id="update-price" required step="0.01">

    <button type="submit">Atualizar Produto</button>

  </form>

  <ul id="products"></ul>

  <script src="app.js"></script>

  <script>
    window.addEventListener('load', fetchProducts);
  </script>

</body>

</html>
